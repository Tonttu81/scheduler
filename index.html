<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week scheduler</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <nav>
        <ul>
            <li><a class="active" href="index.html">Scheduler</a></li>
            <li><a href="settings.html">Settings</a></li>
        </ul>
    </nav>

    <div class="button-container">
        <button id="previous-day-button" type="button">🠘</button>
        <button id="new-event-button" type="button">New event</button>
        <button id="next-day-button" type="button">🠚</button>
    </div>

    <div class="container-grid">
        <div class="days-container">
            <div>
                <div>6.4.</div>
                <div>Mon</div>
            </div>
            <div>
                <div>7.4.</div>
                <div>Tue</div>
            </div>
            <div>
                <div>8.4.</div>
                <div>Wed</div>
            </div>
            <div>
                <div>9.4.</div>
                <div>Thu</div>
            </div>
            <div>
                <div>10.4.</div>
                <div>Fri</div>
            </div>
            <div>
                <div>11.4.</div>
                <div>Sat</div>
            </div>
            <div>
                <div>12.4.</div>
                <div>Sun</div>
            </div>
        </div>

        <div class="schedule-wrapper">
            <div class="times-container">
                <div></div>
                <div>01:00</div>
                <div>02:00</div>
                <div>03:00</div>
                <div>04:00</div>
                <div>05:00</div>
                <div>06:00</div>
                <div>07:00</div>
                <div>08:00</div>
                <div>09:00</div>
                <div>10:00</div>
                <div>11:00</div>
                <div>12:00</div>
                <div>13:00</div>
                <div>14:00</div>
                <div>15:00</div>
                <div>16:00</div>
                <div>17:00</div>
                <div>18:00</div>
                <div>19:00</div>
                <div>20:00</div>
                <div>21:00</div>
                <div>22:00</div>
                <div>23:00</div>
            </div>
            <div id="grid" class="schedule-container"></div>
        </div>
    </div>

    <div id="new-event-window">
        <form id="new-event-form">
            <div class="close-button-container">
                <h1>Add new event</h1>
                <button id="new-event-close-button" type="button">X</button>
            </div>

            <input type="text" name="title" placeholder="Title">
            <textarea name="desc" wrap="soft" placeholder="Description"></textarea>

            <div>
                <span>On</span>
                <select name="days">
                    <option value="1">Monday</option>
                    <option value="2">Tuesday</option>
                    <option value="3">Wednesday</option>
                    <option value="4">Thursday</option>
                    <option value="5">Friday</option>
                    <option value="6">Saturday</option>
                    <option value="0">Sunday</option>
                </select>
            </div>

            <div>
                <span>Starting at</span>
                <input type="text" name="start" placeholder="hh:mm">
            </div>

            <div>
                <span>Until</span>
                <input type="text" name="end" placeholder="hh:mm">
            </div>

            <div>
                <span>Recurring?</span>
                <input type="checkbox" name="recurring">
            </div>
            
            <button id="create-new-event-button" type="submit">Add event</button>
        </form>
    </div>

    <script type="module" src="./js/functions.js"></script>
</body>
</html>
